name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  unit:
    name: "Unit & Integration tests"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        ruby: ['3.3', '3.4']

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        env:
          BUNDLE_GEMFILE: Gemfile.ci
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Run RSpec
        env:
          BUNDLE_GEMFILE: Gemfile.ci
        run: bundle exec rspec test/ --format documentation

  scenario:
    name: "Scenario test (multi-worker fork)"
    needs: unit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build CI image
        run: docker compose -f docker-compose.ci.yml build scenario

      - name: Run scenario test
        run: |
          docker compose -f docker-compose.ci.yml run \
            --rm \
            -e SCENARIO_WORKERS=3 \
            -e SCENARIO_JOBS=200 \
            -e SCENARIO_TIMEOUT=60 \
            scenario

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.ci.yml down -v
